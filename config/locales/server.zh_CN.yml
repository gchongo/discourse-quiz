      title: "你提交的题目未通过审核"
      subject_template: "你提交的题目未通过审核"
      text_body_template: |
        你好，你提交的题目未通过审核。

        - 分类：%{category_name}
        - 题目：%{question_excerpt}
        - 审核备注：%{review_note}

        你可以根据备注调整后重新提交，感谢你的参与。
