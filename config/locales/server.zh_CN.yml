        你好，你提交的题目已通过审核并加入题库。

        - 分类：%{category_name}
        - 题目：%{question_excerpt}
        - 审核备注：%{review_note}
        - 本次奖励积分：%{points_awarded}

        投稿奖励规则：每条通过可得积分，且每日上限为 %{daily_cap} 分。
